# Build the multi-arch companion image (linux/amd64 + linux/arm64) and push it
# to this repo's GitHub Container Registry. No secrets to configure — the
# built-in GITHUB_TOKEN authenticates the push.
#
# Runs when you push a version tag (e.g. `git tag v0.1.0 && git push --tags`)
# or when you trigger it by hand from the Actions tab.
name: Publish container image

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Compute image coordinates
        id: meta
        run: |
          VERSION="$(tr -d ' \t\n\r' < VERSION)"
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/splitflap-gateway-companion"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE"     >> "$GITHUB_OUTPUT"
          # Which channel tags move to this build (a newline-separated list, the form
          # build-push-action wants):
          #   prerelease (1.5.1-beta.1) -> :beta only. :latest stays on the newest
          #     stable, which is what a plain `docker pull` and the stable add-on get.
          #   stable     (1.5.1)        -> :latest AND :beta. A stable release is by
          #     definition at least as new as any beta, so the beta channel should never
          #     be left pointing at an OLDER prerelease — it tracks the newest build.
          {
            echo "tags<<TAGS"
            echo "$IMAGE:$VERSION"
            if [ "${VERSION#*-}" != "$VERSION" ]; then
              echo "$IMAGE:beta"
            else
              echo "$IMAGE:latest"
              echo "$IMAGE:beta"
            fi
            echo "TAGS"
          } >> "$GITHUB_OUTPUT"

      # QEMU lets the amd64 runner cross-build the arm64 layer.
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=SplitFlap Gateway Companion
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=CC-BY-NC-SA-4.0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keep the registry tidy: after each publish, delete old versions of the image.
      #
      # min-versions-to-keep counts REGISTRY VERSIONS, not releases, and one multi-arch
      # build is worth several: the index, one child manifest per architecture, and the
      # attestation manifests buildx attaches. It was 6 — nominally "two builds" — which
      # in practice retained barely ONE, and a beta publish deleted the stable image that
      # :latest and the stable add-on point at. The channels must survive a publish of the
      # OTHER channel, so keep enough versions for several builds of each.
      - name: Prune old image versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: splitflap-gateway-companion
          package-type: container
          min-versions-to-keep: 30
          delete-only-untagged-versions: false

      # A publish that leaves a channel tag dangling is a broken install for anyone on it
      # (Supervisor pulls :<version> and gets nothing). Prove both channels still resolve
      # before calling the run green — the prune above is the thing most likely to break
      # them, and it did once.
      - name: Verify the channel tags still resolve
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          VERSION="${{ steps.meta.outputs.version }}"
          fail=0
          for tag in "$VERSION" beta latest; do
            if docker buildx imagetools inspect "$IMAGE:$tag" >/dev/null 2>&1; then
              echo "ok      $IMAGE:$tag"
            elif [ "$tag" = latest ] && [ "${VERSION#*-}" != "$VERSION" ]; then
              # A prerelease never moves :latest; only complain if it vanished entirely.
              echo "MISSING $IMAGE:latest — a prerelease must not leave stable dangling"
              fail=1
            else
              echo "MISSING $IMAGE:$tag"
              fail=1
            fi
          done
          exit $fail
