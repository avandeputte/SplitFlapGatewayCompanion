services:
  companion:
    # Prefer the published multi-arch image from GitHub Container Registry
    # (works on x86 and arm64 — Raspberry Pi, Apple Silicon — automatically).
    #   docker compose pull && docker compose up -d
    # Set GHCR_OWNER (your GitHub user/org) in .env; pin a release with
    # COMPANION_TAG. `build: .` is kept as a fallback so `docker compose build`
    # still works for local development without the registry.
    image: ghcr.io/${GHCR_OWNER:-avandeputte}/splitflap-gateway-companion:${COMPANION_TAG:-latest}
    build: .
    container_name: splitflap-companion
    ports:
      - "8000:8000"
    volumes:
      - companion-data:/data
    restart: unless-stopped
    environment:
      # The gateway is the source of truth: grid size + MQTT broker/port/user/
      # prefix are pulled from its /api/config. There is no config file — normally
      # this URL is the only thing you set:
      GATEWAY_URL: "http://192.168.1.50"   # REQUIRED — the app refuses to start without it
      # The companion always talks to the gateway over REST (/api/rs485/batch);
      # there is no transport setting. MQTT below is only for Home Assistant.
      # This companion's own URL, registered with the gateway (v3.0+) so it shows
      # a "Companion" tab linking back here:
      # COMPANION_PUBLIC_URL: "http://companion-host:8000"
      # MQTT password is NOT exposed by the gateway — set it here if your broker
      # needs auth (leave unset for an anonymous broker):
      # COMPANION_MQTT_PASSWORD: ""
      COMPANION_MODULE_ID_BASE: "0"       # companion-owned; module id of grid index 0
      # COMPANION_SYNC_FROM_GATEWAY: "true"
      # Where settings live (needs Gateway 3.1+): mirror (default) | local | gateway.
      # "mirror" lets a fresh companion on a new host restore its settings from the
      # gateway; "gateway" keeps nothing on disk. Degrades to local on a 3.0 gateway.
      # COMPANION_SETTINGS_STORE: "mirror"
      # Home Assistant: auto (follow the gateway) | true | false
      COMPANION_HA: "auto"
      # --- Manual overrides (only if you do NOT want to read from the gateway) ---
      # COMPANION_GRID_ROWS: "3"
      # COMPANION_GRID_COLS: "15"
      # COMPANION_MQTT_BROKER: "192.168.1.50"
      # COMPANION_MQTT_PORT: "1883"
      # COMPANION_MQTT_PREFIX: "splitflap"
      # COMPANION_MQTT_USER: ""

volumes:
  companion-data:
